version: 1

project:
  name: "dbt Governance E2E Fixture"
  description: "Dedicated fixture repo for PR automation and validation"

dbt_cloud:
  enabled: false

global:
  severity_default: warning
  fail_on: error
  changed_files_only: true
  exclude_paths:
    - "dbt_packages/"
    - "target/"

naming:
  enabled: true
  rules:
    staging_prefix:
      enabled: true
      severity: error
      pattern: "stg_{source}__{entity}"
      description: "Staging models must follow stg_<source>__<entity> naming"
    intermediate_prefix:
      enabled: true
      severity: error
      pattern: "int_{entity}_{verb}"
      description: "Intermediate models must follow int_<entity>_<verb> naming"
    marts_prefix:
      enabled: true
      severity: error
      patterns:
        facts: "fct_{entity}"
        dimensions: "dim_{entity}"
        other: "{entity}"
      description: "Mart models must use fct_ or dim_ prefixes"
    source_schema_required:
      enabled: true
      severity: warning
      description: "All sources must define an explicit schema"
    model_file_matches_name:
      enabled: true
      severity: error
      description: "SQL filename must match the model name"

structure:
  enabled: true
  rules:
    staging_refs_source_only:
      enabled: true
      severity: error
    marts_no_source_refs:
      enabled: true
      severity: error
    no_cross_layer_skipping:
      enabled: true
      severity: warning
    no_orphan_models:
      enabled: false
      severity: info
    no_rejoin_patterns:
      enabled: true
      severity: warning
    model_directories_match_layers:
      enabled: true
      severity: error
      directories:
        staging: "models/staging/"
        intermediate: "models/intermediate/"
        marts: "models/marts/"

testing:
  enabled: true
  rules:
    primary_key_test_required:
      enabled: true
      severity: error
    minimum_test_coverage:
      enabled: true
      severity: warning
      min_tests_per_model: 2
    staging_freshness_required:
      enabled: false
      severity: warning
    marts_have_contract:
      enabled: false
      severity: info
    no_disabled_tests:
      enabled: true
      severity: warning

documentation:
  enabled: true
  rules:
    model_description_required:
      enabled: true
      severity: error
      layers: ["staging", "intermediate", "marts"]
    column_description_required:
      enabled: true
      severity: warning
      layers: ["marts"]
    source_description_required:
      enabled: true
      severity: warning
    schema_yml_exists:
      enabled: true
      severity: error

materialization:
  enabled: true
  rules:
    staging_must_be_view:
      enabled: true
      severity: warning
    incremental_must_have_unique_key:
      enabled: false
      severity: error
    incremental_must_have_on_schema_change:
      enabled: false
      severity: warning

style:
  enabled: true
  rules:
    cte_pattern:
      enabled: true
      severity: warning
    no_hardcoded_schema:
      enabled: true
      severity: error
    no_select_star_in_marts:
      enabled: true
      severity: warning
    final_select_from_named_cte:
      enabled: true
      severity: warning
    refs_in_ctes_not_inline:
      enabled: true
      severity: warning

migration:
  enabled: true
  rules:
    no_ref_or_source:
      enabled: true
      severity: error
    ddl_statements:
      enabled: true
      severity: error
    hardcoded_environment_schema:
      enabled: true
      severity: error
    missing_source_definition:
      enabled: true
      severity: error
    no_layering:
      enabled: true
      severity: warning

reuse:
  enabled: true
  rules:
    duplicate_source_staging:
      enabled: true
      severity: warning
    shared_cte_candidates:
      enabled: true
      severity: info
      min_occurrences: 3
    multiple_models_from_same_source:
      enabled: true
      severity: warning
    identical_select_columns:
      enabled: true
      severity: info
