name: dbt Governance Fixture Validation

on:
  pull_request:
    branches: [main]
    paths:
      - "models/**"
      - ".dbt-governance.yml"
      - "dbt_project.yml"

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
      security-events: write
    env:
      DBT_GOVERNANCE_PACKAGE: "git+https://github.com/colin-thornburg/dbt-governance-as-code.git"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install "$DBT_GOVERNANCE_PACKAGE" dbt-core dbt-duckdb

      - name: Write fixture dbt profile
        run: |
          mkdir -p "$RUNNER_TEMP/dbt"
          cat <<'EOF' > "$RUNNER_TEMP/dbt/profiles.yml"
          e2e_fixture:
            target: dev
            outputs:
              dev:
                type: duckdb
                path: ":memory:"
                threads: 1
          EOF

      - name: Parse dbt project
        run: dbt parse --profiles-dir "$RUNNER_TEMP/dbt"

      - name: Run governance scan with annotations
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          dbt-governance scan \
            --local \
            --manifest target/manifest.json \
            --project-dir . \
            --changed-only \
            --github-annotate \
            --output sarif \
            --output-file governance.sarif

      - name: Upload SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: governance.sarif
          category: dbt-governance
